name: Deploy

# Deploys to the DigitalOcean droplet by SSHing in and running the apps-infra
# deploy script (git pull + docker-compose build + up). Runs after the Tests
# workflow succeeds on main, or on manual dispatch.
# Requires org/repo secrets: MARSWARS_APPS_DEPLOY_HOST, MARSWARS_APPS_DEPLOY_USER,
# MARSWARS_APPS_DEPLOY_SSH_KEY (see apps-infra README).

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Manual runs always deploy; automatic runs only after Tests passed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MARSWARS_APPS_DEPLOY_HOST }}
          username: ${{ secrets.MARSWARS_APPS_DEPLOY_USER }}
          key: ${{ secrets.MARSWARS_APPS_DEPLOY_SSH_KEY }}
          # Default (10m) isn't enough headroom on the droplet's 1 vCPU / 1GB when a
          # requirements.txt change forces a real rebuild instead of a cache hit.
          command_timeout: 30m
          script: /opt/apps/deploy.sh
