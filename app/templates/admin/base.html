<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin — FRC Attendance{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0a0a0a; }
    .sidebar { min-height: 100vh; background: #111111; border-right: 1px solid #2a1a1a; }
    .sidebar .nav-link { color: #9a7878; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #f0e8e8; background: rgba(204,34,0,.18); border-radius: 6px; }
    .sidebar .nav-link.active { color: #fff; }
    .sidebar-brand { color: #cc2200; font-weight: 700; font-size: 1.1rem; }
    /* Retheme Bootstrap primary to kiosk red */
    :root, [data-bs-theme="dark"] {
      --bs-primary: #cc2200;
      --bs-primary-rgb: 204, 34, 0;
      --bs-link-color: #e05540;
      --bs-link-color-rgb: 224, 85, 64;
      --bs-link-hover-color: #ff6644;
      --bs-focus-ring-color: rgba(204, 34, 0, 0.25);
    }
    .btn-primary {
      --bs-btn-bg: #cc2200;
      --bs-btn-border-color: #cc2200;
      --bs-btn-hover-bg: #aa1c00;
      --bs-btn-hover-border-color: #aa1c00;
      --bs-btn-active-bg: #991900;
      --bs-btn-active-border-color: #991900;
      --bs-btn-focus-shadow-rgb: 204, 34, 0;
    }
    .btn-outline-primary {
      --bs-btn-color: #e05540;
      --bs-btn-border-color: #cc2200;
      --bs-btn-hover-bg: #cc2200;
      --bs-btn-hover-border-color: #cc2200;
      --bs-btn-hover-color: #fff;
      --bs-btn-active-bg: #cc2200;
      --bs-btn-active-border-color: #cc2200;
      --bs-btn-active-color: #fff;
      --bs-btn-focus-shadow-rgb: 204, 34, 0;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-2 d-none d-md-block sidebar px-3 py-4">
      <a class="sidebar-brand d-block mb-4" href="/admin"><i class="bi bi-tools"></i> FRC Tracker</a>
      <ul class="nav flex-column gap-1">
        <li class="nav-item"><a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/admin"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page == 'students' %}active{% endif %}" href="/admin/students"><i class="bi bi-people me-2"></i>Students</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page == 'mentors' %}active{% endif %}" href="/admin/mentors"><i class="bi bi-person-badge me-2"></i>Mentors</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page == 'requirements' %}active{% endif %}" href="/admin/requirements"><i class="bi bi-calendar-check me-2"></i>Hour Requirements</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page == 'sessions' %}active{% endif %}" href="/admin/sessions"><i class="bi bi-clock-history me-2"></i>Sessions</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page == 'settings' %}active{% endif %}" href="/admin/settings"><i class="bi bi-gear me-2"></i>Settings</a></li>
        <li class="nav-item mt-4"><a class="nav-link text-danger" href="/admin/logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="col-md-10 ms-sm-auto px-4 py-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
