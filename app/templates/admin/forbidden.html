<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Access denied — Tempus</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card-403 { background: #111111; border: 1px solid #2a1a1a; border-radius: 10px; padding: 2rem; width: 420px; color: #f0e8e8; }
    .card-403 h1 { color: #cc2200; font-size: 1.4rem; font-weight: 700; }
    .card-403 a { color: #cc2200; }
    .muted { color: #9a7878; }
  </style>
</head>
<body>
  <div class="card-403 text-center">
    <h1 class="mb-3"><i class="bi bi-shield-lock"></i> Access denied</h1>
    {% if name %}<p>Signed in as <strong>{{ name }}</strong>.</p>{% endif %}
    <p class="muted">Your account isn't in the <code>tempus-admin</code> group, so you can't
    open the Tempus admin area. Ask a team admin to grant it in Legion.</p>
    <p class="mt-4"><a href="/admin/logout"><i class="bi bi-box-arrow-right"></i> Sign in as someone else</a></p>
  </div>
</body>
</html>
