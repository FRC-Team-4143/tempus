<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Login — Tempus</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #0d1117; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 2rem; width: 360px; }
    .login-card h1 { color: #cc2200; font-size: 1.4rem; font-weight: 700; }
    label, .form-control { color: #e6edf3; }
    .form-control { background: #0d1117; border-color: #30363d; color: #e6edf3; }
    .form-control:focus { background: #0d1117; border-color: #cc2200; color: #e6edf3; box-shadow: none; }
    .btn-primary { --bs-btn-bg: #cc2200; --bs-btn-border-color: #cc2200; }
    .btn-primary:hover { --bs-btn-bg: #aa1c00; --bs-btn-border-color: #aa1c00; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="mb-4"><i class="bi bi-lock"></i> Admin Login</h1>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>
  </div>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</body>
</html>
