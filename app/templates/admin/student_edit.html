{% extends "admin/base.html" %}
{% set active_page = "students" %}
{% block title %}Edit Student — FRC Attendance Admin{% endblock %}

{% block content %}
<h2 class="mb-4">Edit Student</h2>
{% if error %}
<div class="alert alert-danger alert-dismissible fade show py-2" role="alert">
  <i class="bi bi-exclamation-triangle me-1"></i> {{ error }}
  <button type="button" class="btn-close py-2" data-bs-dismiss="alert"></button>
</div>
{% endif %}
<div class="card shadow-sm" style="max-width:500px">
  <div class="card-body">
    <p class="text-muted mb-3">Tracker UID: <span>{{ student.student_code or '—' }}</span></p>
    <form method="post" action="/admin/students/{{ student.id }}/edit">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input name="name" class="form-control" value="{{ student.name }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Team</label>
        <select name="team_id" class="form-select" required>
          {% for t in teams %}
          <option value="{{ t.id }}" {% if t.id == student.team_id %}selected{% endif %}>{{ t.number }} — {{ t.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Category</label>
        <select name="category" class="form-select" required>
          <option value="" disabled {% if not student.category %}selected{% endif %}>— Select category —</option>
          {% for c in categories %}
          <option value="{{ c.value }}" {% if student.category == c %}selected{% endif %}>{{ c.value | capitalize }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Slack User ID</label>
        <input name="slack_user_id" class="form-control" value="{{ student.slack_user_id or '' }}">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/admin/students" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
