<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #b71c1c;
            --secondary-color: #d32f2f;
            --accent-color: #ff5252;
            --background-gradient: linear-gradient(135deg, #000000 0%, #212121 50%, #424242 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #212121;
            --text-light: #ffffff;
            --success-color: #4caf50;
            --danger-color: #f44336;
            --black-accent: #000000;
        }
        
        body {
            background: var(--background-gradient);
            min-height: 100vh;
            font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-dark);
        }
        
        .main-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
        }
        
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--black-accent) 100%);
            color: var(--text-light);
            border-radius: 16px 16px 0 0 !important;
            border: none;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .card-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,193,7,0.1) 50%, transparent 70%);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--black-accent) 100%);
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(183, 28, 28, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(183, 28, 28, 0.4);
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success-color) 0%, #66bb6a 100%);
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--danger-color) 0%, #ef5350 100%);
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3);
        }
        
        .form-control {
            border-radius: 12px;
            border: 2px solid #e3f2fd;
            padding: 14px 16px;
            transition: all 0.3s ease;
            font-size: 1rem;
            background: rgba(255,255,255,0.8);
        }
        
        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(255, 87, 34, 0.25);
            background: white;
        }
        
        .status-card {
            background: linear-gradient(135deg, var(--secondary-color) 0%, #ff7043 100%);
            color: var(--text-light);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            box-shadow: 0 6px 20px rgba(255, 87, 34, 0.3);
        }
        
        .status-checked-in {
            background: linear-gradient(135deg, var(--success-color) 0%, #66bb6a 100%);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.3);
        }
        
        .status-checked-out {
            background: linear-gradient(135deg, var(--danger-color) 0%, #ef5350 100%);
            box-shadow: 0 6px 20px rgba(244, 67, 54, 0.3);
        }
        
        .name-toggle-btn {
            width: 100%;
            min-height: 70px;
            border-radius: 16px;
            border: 3px solid #e3f2fd;
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .name-toggle-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .name-toggle-btn.checked-in {
            background: linear-gradient(135deg, var(--success-color) 0%, #66bb6a 100%);
            border-color: var(--success-color);
            color: var(--text-light);
            box-shadow: 0 6px 25px rgba(76, 175, 80, 0.4);
            animation: pulse-success 2s infinite;
        }
        
        @keyframes pulse-success {
            0%, 100% { box-shadow: 0 6px 25px rgba(76, 175, 80, 0.4); }
            50% { box-shadow: 0 6px 30px rgba(76, 175, 80, 0.6); }
        }
        
        .name-toggle-btn.checked-out {
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
            border-color: #e3f2fd;
            color: var(--text-dark);
        }
        
        .name-toggle-btn.loading {
            pointer-events: none;
            opacity: 0.8;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.6; }
        }
        
        .name-toggle-btn .status-icon {
            font-size: 1.4rem;
            margin-right: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .name-toggle-btn .btn-spinner {
            display: none;
            width: 1.2rem;
            height: 1.2rem;
            margin-right: 10px;
        }
        
        .name-toggle-btn.loading .status-icon {
            display: none;
        }
        
        .name-toggle-btn.loading .btn-spinner {
            display: inline-block;
        }
        
        .admin-link {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--black-accent) 100%);
            color: var(--text-light);
            padding: 12px 18px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(183, 28, 28, 0.3);
            z-index: 1000;
        }
        
        .admin-link:hover {
            color: var(--text-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(183, 28, 28, 0.4);
        }
        
        .scoreboard-link {
            position: fixed;
            top: 20px;
            right: 170px;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--secondary-color) 100%);
            color: var(--text-light);
            padding: 12px 18px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 82, 82, 0.3);
            z-index: 1000;
        }
        
        .scoreboard-link:hover {
            color: var(--text-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 82, 82, 0.4);
        }
        
        .records-today {
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid rgba(255,193,7,0.3);
        }
        
        .record-item {
            background: white;
            border-radius: 10px;
            padding: 1rem;
            margin: 0.5rem 0;
            border-left: 4px solid var(--secondary-color);
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .record-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .loading {
            display: none;
        }
        
        .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
        }
        
        @media (max-width: 768px) {
            .main-container {
                margin: 1rem;
                padding: 1rem;
            }
            
            .admin-link {
                top: 10px;
                right: 10px;
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            
            .scoreboard-link {
                top: 60px;
                right: 10px;
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            
            .name-toggle-btn {
                min-height: 60px;
                font-size: 1rem;
            }
        }
        
        /* Red and black team inspired accent elements */
        .team-title {
            background: linear-gradient(45deg, var(--accent-color), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            text-shadow: none;
        }
        
        .tech-border {
            border: 2px solid transparent;
            background: linear-gradient(white, white) padding-box, 
                       linear-gradient(45deg, var(--accent-color), var(--primary-color)) border-box;
        }
    </style>
</head>
<body>
    <a href="/admin" class="admin-link">
        <i class="fas fa-chart-line"></i> Admin Dashboard
    </a>
    
    <a href="/scoreboard" class="scoreboard-link">
        <i class="fas fa-clock"></i> Leaderboard
    </a>

    <div class="container-fluid">
        <div class="main-container">
            <div class="card">
                <div class="card-header">
                    <h1 class="mb-0 team-title">
                        <i class="fas fa-rocket"></i>
                        MARS/WARS Attendance
                    </h1>
                    <p class="mb-0 mt-2">Track your team presence</p>
                </div>
                <div class="card-body p-4">
                    <!-- Status Display -->
                    <div id="statusDisplay" class="status-card" style="display: none;">
                        <h4 id="statusText"></h4>
                        <div id="recordsToday" class="records-today" style="display: none;">
                            <h6 class="text-dark">Today's Records:</h6>
                            <div id="todayRecordsList"></div>
                        </div>
                    </div>

                    <!-- Preset Names Toggle Interface -->
                    <div id="nameToggleInterface">
                        <h5 class="text-center mb-4">
                            <i class="fas fa-users"></i> Team Attendance
                        </h5>
                        <div class="row g-3" id="nameButtonsContainer">
                            <!-- Name buttons will be loaded here -->
                        </div>
                    </div>

                    <!-- Alert Messages -->
                    <div id="alertContainer" class="mt-3"></div>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="card mt-4">
                <div class="card-body text-center">
                    <h5 class="card-title">
                        <i class="fas fa-chart-bar"></i> Today's Summary
                    </h5>
                    <div id="todaySummary" class="row g-3">
                        <div class="col-4">
                            <div class="h4 mb-0 text-primary" id="totalCheckIns">-</div>
                            <small class="text-muted">Check-ins</small>
                        </div>
                        <div class="col-4">
                            <div class="h4 mb-0 text-danger" id="totalCheckOuts">-</div>
                            <small class="text-muted">Check-outs</small>
                        </div>
                        <div class="col-4">
                            <div class="h4 mb-0 text-success" id="uniqueUsers">-</div>
                            <small class="text-muted">Unique Users</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Global variables
        let presetNames = [];
        let nameStatuses = {};

        // Load and initialize
        window.onload = function() {
            loadPresetNames();
            loadTodaySummary();
        };

        async function loadPresetNames() {
            try {
                const response = await fetch('/api/names');
                presetNames = await response.json();
                await loadNameStatuses();
                renderNameButtons();
            } catch (error) {
                console.error('Error loading preset names:', error);
                showAlert('Error loading preset names. Please refresh the page.', 'danger');
            }
        }

        async function loadNameStatuses() {
            nameStatuses = {};
            
            for (const name of presetNames) {
                try {
                    const response = await fetch(`/api/status/${encodeURIComponent(name)}`);
                    const data = await response.json();
                    nameStatuses[name] = data.status;
                } catch (error) {
                    console.error(`Error loading status for ${name}:`, error);
                    nameStatuses[name] = 'not-checked-in';
                }
            }
        }

        function renderNameButtons() {
            const container = document.getElementById('nameButtonsContainer');
            container.innerHTML = '';
            
            presetNames.forEach(name => {
                const status = nameStatuses[name] || 'not-checked-in';
                const isCheckedIn = status === 'checked-in';
                
                const buttonCol = document.createElement('div');
                buttonCol.className = 'col-md-4 col-sm-6 mb-3';
                
                const button = document.createElement('button');
                button.className = `btn name-toggle-btn ${isCheckedIn ? 'checked-in' : 'checked-out'}`;
                button.onclick = () => toggleAttendance(name);
                
                button.innerHTML = `
                    <i class="fas ${isCheckedIn ? 'fa-check-circle' : 'fa-circle'} status-icon"></i>
                    <span class="spinner-border btn-spinner" role="status"></span>
                    <span class="name-text">${name}</span>
                    <div class="small mt-1">${isCheckedIn ? 'Checked In' : 'Check In'}</div>
                `;
                
                buttonCol.appendChild(button);
                container.appendChild(buttonCol);
            });
        }

        async function toggleAttendance(name) {
            const button = event.currentTarget;
            
            // Prevent double-clicks
            if (button.classList.contains('loading')) {
                console.log('Request already in progress for', name);
                return;
            }
            
            // Show loading state and disable button
            button.classList.add('loading');
            button.style.pointerEvents = 'none';
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 second timeout
                
                const response = await fetch('/api/toggle-attendance', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.success) {
                    // Update local status
                    nameStatuses[name] = data.new_status;
                    
                    // Update button appearance
                    const isCheckedIn = data.new_status === 'checked-in';
                    button.className = `btn name-toggle-btn ${isCheckedIn ? 'checked-in' : 'checked-out'}`;
                    
                    const statusIcon = button.querySelector('.status-icon');
                    const statusText = button.querySelector('.small');
                    statusIcon.className = `fas ${isCheckedIn ? 'fa-check-circle' : 'fa-circle'} status-icon`;
                    statusText.textContent = isCheckedIn ? 'Checked In' : 'Check In';
                    
                    // Show success message
                    showAlert(`${name} ${data.action.replace('-', ' ')} successful!`, 'success');
                    
                    // Refresh summary
                    loadTodaySummary();
                } else {
                    showAlert(data.message || 'Unknown error occurred', 'danger');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showAlert(`Request timed out for ${name}. Please try again.`, 'warning');
                } else {
                    showAlert(`Error updating attendance for ${name}. Please try again.`, 'danger');
                }
                console.error('Toggle attendance error:', error);
            } finally {
                // Remove loading state and re-enable button
                button.classList.remove('loading');
                button.style.pointerEvents = 'auto';
            }
        }

        // Save form data to localStorage
        function saveFormData() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            if (name) localStorage.setItem('attendanceName', name);
            if (email) localStorage.setItem('attendanceEmail', email);
        }

        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            alertContainer.innerHTML = alertHtml;
            
            // Auto-dismiss after 5 seconds
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) {
                    bootstrap.Alert.getOrCreateInstance(alert).close();
                }
            }, 5000);
        }

        function showLoading(buttonId) {
            const btn = document.getElementById(buttonId);
            const loading = btn.querySelector('.loading');
            const btnText = btn.querySelector('.btn-text');
            
            loading.style.display = 'inline-block';
            btnText.style.display = 'none';
            btn.disabled = true;
        }

        function hideLoading(buttonId) {
            const btn = document.getElementById(buttonId);
            const loading = btn.querySelector('.loading');
            const btnText = btn.querySelector('.btn-text');
            
            loading.style.display = 'none';
            btnText.style.display = 'inline';
            btn.disabled = false;
        }

        async function checkIn() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const notes = document.getElementById('notes').value.trim();

            if (!name || !email) {
                showAlert('Please fill in your name and email.', 'warning');
                return;
            }

            saveFormData();
            showLoading('checkInBtn');

            try {
                const response = await fetch('/api/check-in', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, notes })
                });

                const data = await response.json();
                
                if (data.success) {
                    showAlert(`Welcome, ${name}! You have successfully checked in.`, 'success');
                    checkStatus(); // Refresh status
                    loadTodaySummary(); // Refresh summary
                } else {
                    showAlert(data.message, 'danger');
                }
            } catch (error) {
                showAlert('Error checking in. Please try again.', 'danger');
                console.error('Check-in error:', error);
            } finally {
                hideLoading('checkInBtn');
            }
        }

        async function checkOut() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const notes = document.getElementById('notes').value.trim();

            if (!name || !email) {
                showAlert('Please fill in your name and email.', 'warning');
                return;
            }

            saveFormData();
            showLoading('checkOutBtn');

            try {
                const response = await fetch('/api/check-out', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, notes })
                });

                const data = await response.json();
                
                if (data.success) {
                    showAlert(`Goodbye, ${name}! You have successfully checked out.`, 'success');
                    checkStatus(); // Refresh status
                    loadTodaySummary(); // Refresh summary
                } else {
                    showAlert(data.message, 'danger');
                }
            } catch (error) {
                showAlert('Error checking out. Please try again.', 'danger');
                console.error('Check-out error:', error);
            } finally {
                hideLoading('checkOutBtn');
            }
        }

        async function checkStatus() {
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                showAlert('Please enter your email to check status.', 'warning');
                return;
            }

            try {
                const response = await fetch(`/api/status/${encodeURIComponent(email)}`);
                const data = await response.json();
                
                const statusDisplay = document.getElementById('statusDisplay');
                const statusText = document.getElementById('statusText');
                const recordsToday = document.getElementById('recordsToday');
                const todayRecordsList = document.getElementById('todayRecordsList');
                
                statusDisplay.style.display = 'block';
                
                // Update status
                if (data.status === 'checked-in') {
                    statusDisplay.className = 'status-card status-checked-in';
                    statusText.innerHTML = '<i class="fas fa-check-circle"></i> Currently Checked In';
                } else if (data.status === 'checked-out') {
                    statusDisplay.className = 'status-card status-checked-out';
                    statusText.innerHTML = '<i class="fas fa-times-circle"></i> Currently Checked Out';
                } else {
                    statusDisplay.className = 'status-card';
                    statusText.innerHTML = '<i class="fas fa-question-circle"></i> No Check-in Today';
                }
                
                // Show today's records
                if (data.records_today && data.records_today.length > 0) {
                    recordsToday.style.display = 'block';
                    todayRecordsList.innerHTML = data.records_today.map(record => `
                        <div class="record-item">
                            <strong>${record.Action}:</strong> ${record.Timestamp}
                            ${record.Notes ? `<br><small>Notes: ${record.Notes}</small>` : ''}
                        </div>
                    `).join('');
                } else {
                    recordsToday.style.display = 'none';
                }
                
            } catch (error) {
                showAlert('Error checking status. Please try again.', 'danger');
                console.error('Status check error:', error);
            }
        }

        async function loadTodaySummary() {
            try {
                const response = await fetch('/api/summary');
                const data = await response.json();
                
                document.getElementById('totalCheckIns').textContent = data.total_check_ins || 0;
                document.getElementById('totalCheckOuts').textContent = data.total_check_outs || 0;
                document.getElementById('uniqueUsers').textContent = data.unique_users || 0;
                
            } catch (error) {
                console.error('Error loading summary:', error);
            }
        }

        // Auto-refresh summary every 30 seconds
        setInterval(loadTodaySummary, 30000);
        
        // Auto-save form data when typing
        document.getElementById('name').addEventListener('input', saveFormData);
        document.getElementById('email').addEventListener('input', saveFormData);
    </script>
</body>
</html>
